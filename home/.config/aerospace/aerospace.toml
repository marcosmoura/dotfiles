# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                              STARTUP & LIFECYCLE                              ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

config-version = 2
start-at-login = true

exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
]

after-startup-command = [
  # Setup workspaces layouts
  'workspace terminal',
  'layout accordion',

  'workspace coding',
  'layout accordion',

  'workspace browser',
  'layout accordion',

  'workspace design',
  'layout tiles',

  'workspace communication',
  'layout tiles',

  'workspace files',
  'layout tiles',

  'workspace tasks',
  'layout v_tiles',

  'workspace coding',

  # Initial border update
  'exec-and-forget ~/.config/aerospace/scripts/borders.sh',

  # Disable Caps Lock key
  "exec-and-forget hidutil property --set '{\"UserKeyMapping\":[{\"HIDKeyboardModifierMappingSrc\": 0x700000039, \"HIDKeyboardModifierMappingDst\": 0x7000000E3}]}'",

  # Clear wallpaper cache
  'exec-and-forget ~/.config/aerospace/scripts/wallpaper.sh clear-cache',
  'exec-and-forget ~/.config/aerospace/scripts/wallpaper.sh set --radius 12',
]

persistent-workspaces = [
  "terminal",
  "coding",
  "browser",
  "design",
  "communication",
  "files",
  "tasks",
]


# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                                LAYOUT SETTINGS                                ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

accordion-padding = 0

on-focus-changed = ['exec-and-forget ~/.config/aerospace/scripts/borders.sh']
on-focused-monitor-changed = [
  'exec-and-forget ~/.config/aerospace/scripts/borders.sh',
]

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                         NORMALIZATION SETTINGS                                ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                           MACOS INTEGRATION                                   ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

automatically-unhide-macos-hidden-apps = true

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                            GAPS CONFIGURATION                                 ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

[gaps]
inner.horizontal = 12
inner.vertical = 12

outer.top = 52
outer.right = 12
outer.bottom = 12
outer.left = 12

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                     WORKSPACE TO MONITOR ASSIGNMENT                           ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

[workspace-to-monitor-force-assignment]
terminal = 'main'
coding = 'main'
browser = 'main'
design = 'main'
communication = 'main'

files = 'secondary'
tasks = 'secondary'

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                            KEY MAPPING                                        ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

[key-mapping]
preset = 'qwerty'

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                       EXEC ENVIRONMENT CONFIGURATION                          ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

[exec]
inherit-env-vars = true

[exec.env-vars]
PATH = '~/.cargo/bin:/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                        WINDOW DETECTION RULES                                 ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# ═══════  Monitor 1 Assignments

# Terminal
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace terminal'

# Coding
[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace coding'

# Browser
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace browser'

# Design
[[on-window-detected]]
if.app-id = 'com.figma.Desktop'
run = 'move-node-to-workspace design'

# Communication
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace communication'

# ═══════  Monitor 2 Assignments

# Files
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'move-node-to-workspace files'

# Tasks
[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'move-node-to-workspace tasks'

[[on-window-detected]]
if.app-id = 'com.apple.calendar'
run = 'move-node-to-workspace tasks'

[[on-window-detected]]
if.app-id = 'com.apple.reminders'
run = 'move-node-to-workspace tasks'

# ═══════  Floating Layouts

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                          MAIN MODE KEYBINDINGS                                ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

[mode.main.binding]

# ═══════  WORKSPACE SWITCHING

alt-1 = 'workspace terminal'
alt-2 = 'workspace coding'
alt-3 = 'workspace browser'
alt-4 = 'workspace design'
alt-5 = 'workspace communication'
alt-6 = 'workspace files'
alt-7 = 'workspace tasks'

alt-shift-1 = 'move-node-to-workspace terminal --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace coding --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace browser --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace design --focus-follows-window'
alt-shift-5 = 'move-node-to-workspace communication --focus-follows-window'
alt-shift-6 = 'move-node-to-workspace files --focus-follows-window'
alt-shift-7 = 'move-node-to-workspace tasks --focus-follows-window'

# ═══════  Wallpaper
cmd-ctrl-shift-w = 'exec-and-forget ~/.config/aerospace/scripts/wallpaper.sh set --radius 12'

# ═══════  Disable built-in useless hotkeys
cmd-h = []
cmd-alt-h = []

# ═══════  Take screenshots and copy to clipboard
cmd-ctrl-s = 'exec-and-forget screencapture -i -c'

# ═══════  Reload all configs
cmd-ctrl-r = [
  'reload-config',
  'flatten-workspace-tree',
  'balance-sizes',
  'exec-and-forget sketchybar --reload',
]

# ═══════  Resize and balance workspace
cmd-ctrl-equal = ['resize width +50', 'resize height +50']
cmd-ctrl-minus = ['resize width -50', 'resize height -50']
cmd-ctrl-e = ['flatten-workspace-tree', 'balance-sizes']

# ═══════  Layout shortcuts
cmd-ctrl-b = [
  'layout tiles',
  'exec-and-forget ~/.config/aerospace/scripts/borders.sh',
]
cmd-ctrl-g = [
  'layout tiles',
  'exec-and-forget ~/.config/aerospace/scripts/borders.sh',
]
cmd-ctrl-f = [
  'layout floating tiling',
  'exec-and-forget ~/.config/aerospace/scripts/borders.sh',
]
cmd-ctrl-a = [
  'layout accordion',
  'exec-and-forget ~/.config/aerospace/scripts/borders.sh',
]
cmd-ctrl-m = [
  'layout accordion',
  'exec-and-forget ~/.config/aerospace/scripts/borders.sh',
]
cmd-ctrl-v = [
  'layout v_tiles',
  'balance-sizes',
  'exec-and-forget ~/.config/aerospace/scripts/borders.sh',
]
cmd-ctrl-c = [
  'layout h_tiles',
  'balance-sizes',
  'exec-and-forget ~/.config/aerospace/scripts/borders.sh',
]

# ═══════  Move windows between displays
cmd-alt-ctrl-left = 'move-node-to-monitor left'
cmd-alt-ctrl-right = 'move-node-to-monitor right'
cmd-alt-ctrl-up = 'move-node-to-monitor up'
cmd-alt-ctrl-down = 'move-node-to-monitor down'

# ═══════  Focus windows
cmd-ctrl-shift-left = 'focus left'
cmd-ctrl-shift-right = 'focus right'
cmd-ctrl-shift-up = 'focus up'
cmd-ctrl-shift-down = 'focus down'

# ═══════  Cycle windows
cmd-backtick = 'focus dfs-next --boundaries-action wrap-around-the-workspace'
cmd-shift-backtick = 'focus dfs-prev --boundaries-action wrap-around-the-workspace'

# ═══════  Move windows
cmd-ctrl-left = 'move left'
cmd-ctrl-right = 'move right'
cmd-ctrl-up = 'move up'
cmd-ctrl-down = 'move down'
