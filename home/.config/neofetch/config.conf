#!/usr/bin/env bash

print_info() {
    local os_value display_value terminal_value shell_value packages_value uptime_value battery_value
    local power_line charge_value charge_status
    local label_color="$(color 3)"
    local value_color="$(color 7)"
    local accent_color="$(color 2)"
    local reset_color="$reset"
    local pad="$(printf '\e[%sC' "$(( ${text_padding:-0} + 2 ))")"
    local footer_value

    os_value="$(sw_vers -productName 2>/dev/null) - $(sw_vers -productVersion 2>/dev/null) Tahoe"

    display_value="Color LCD: 1920x1200 @ 120Hz in 14\""

    terminal_value="${TERM_PROGRAM_NAME:-${TERM_PROGRAM:-$TERM}}"
    case "$terminal_value" in
        vscode)
            terminal_value="Code Helper"
            ;;
        "Visual Studio Code")
            terminal_value="Code Helper"
            ;;
    esac

    shell_value="${OPENCODE:-}"
    if [[ -n "$shell_value" ]]; then
        shell_value="opencode"
    else
        shell_value="${SHELL##*/}"
    fi

    packages_value="$(brew list --formula 2>/dev/null | wc -l | tr -d ' ') (brew), $(brew list --cask 2>/dev/null | wc -l | tr -d ' ') (brew-cask)"
    uptime_value="$(uptime | sed -E 's/.*up[[:space:]]+//; s/, [0-9]+ users?.*//; s/, load averages:.*//; s/, load average:.*//; s/^ +//')"
    if [[ "$uptime_value" =~ ^([0-9]+):([0-9]+)$ ]]; then
        uptime_value="${BASH_REMATCH[1]} hours, ${BASH_REMATCH[2]} mins"
    fi

    power_line="$(pmset -g batt 2>/dev/null | tail -n 1)"
    charge_value="$(printf '%s\n' "$power_line" | sed -E 's/.*[^0-9]([0-9]+)%;.*/\1/')"
    charge_status="$(printf '%s\n' "$power_line" | sed -E 's/.*%; ([^;]+);.*/\1/')"
    if [[ "$power_line" == *"remaining"* ]]; then
        battery_value="${accent_color}${charge_value}%${value_color} ($(printf '%s\n' "$power_line" | sed -E 's/.*; ([0-9:]+) remaining.*/\1/' | awk -F: '{printf "%d hours, %d mins", $1, $2}') remaining) [$(tr '[:lower:]' '[:upper:]' <<< "${charge_status:0:1}")${charge_status:1}]"
    else
        battery_value="${accent_color}${charge_value}%${value_color} [$(tr '[:lower:]' '[:upper:]' <<< "${charge_status:0:1}")${charge_status:1}]"
    fi

    footer_value="$(color 0)● $(color 4)● $(color 6)● $(color 5)● $(color 4)● $(color 3)● $(color 2)● $(color 1)●${reset_color}"

    printf '%b\n' "${pad}${label_color}  OS         ${value_color}${os_value}${reset_color} "
    printf '%b\n' "${pad}${label_color}󰍹  Display    ${value_color}${display_value}${reset_color} "
    printf '%b\n' "${pad}${label_color}  Terminal   ${value_color}${terminal_value}${reset_color} "
    printf '%b\n' "${pad}${label_color}  Shell      ${value_color}${shell_value}${reset_color} "
    printf '%b\n' "${pad}${label_color}  Packages   ${value_color}${packages_value}${reset_color} "
    printf '%b\n' "${pad}${label_color}  Uptime     ${value_color}${uptime_value}${reset_color} "
    printf '%b\n' "${pad}${label_color}  Battery    ${value_color}${battery_value}${reset_color} "
    printf '%b\n' "${pad}${label_color}              ${footer_value} "

    info_height=8
    prin=1
}

bold="off"
underline_enabled="off"
separator=" "
ascii_bold="off"
image_backend="ascii"
gap=4
ascii_colors=(2 3 1 5 7 7)
color_blocks="off"
package_managers="off"
shell_version="off"
shell_path="off"
refresh_rate="on"

read -r -d '' image_source <<'EOF' || true
${c1}        .:'
    __ :'__
${c2} .'`  `-'  ``.
:          .-'
${c3}:         :
 :         `-;
${c4}  `.__.-.__.'
EOF
